---
layout: default
---
<article class="work quote-work">
  <header class="work-header">
    <a class="return-link" href="{{ '/sayings/' | relative_url }}">Sayings</a>
    <p class="eyebrow">Saying</p>
    <h1>{{ page.title | escape }}</h1>
    {% if page.source %}
      <p class="work-meta">{{ page.source | escape }}</p>
    {% endif %}
    {% include category-list.html item=page %}
    {% include feature-image.html %}
  </header>
  <div class="prose quote-body">
    {{ content }}
  </div>
</article>
